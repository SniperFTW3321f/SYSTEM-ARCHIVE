<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SYSTEM ARCHIVE</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <header class="top">
    <div class="wrap top__inner">
      <a class="brand" href="./index.html">SYSTEM ARCHIVE</a>
      <nav class="nav">
        <a href="./catalog.html">Catalog</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">

      <div class="hero panel">
        <h1>Machines, vehicles, and more</h1>
        <p class="muted">Browse by category, then open each machine for full specs and info.</p>
        <div class="hero__actions">
          <a class="btn" href="./catalog.html">Open catalog</a>
        </div>
        <div id="fatalError" class="error"></div>
      </div>

      <div id="statsBar" class="statsbar panel"></div>

      <div class="panel">
        <h2>Categories</h2>
        <div id="categoryGrid" class="catgrid"></div>
      </div>

    </div>
  </main>

  <footer class="foot">
    <div class="wrap muted">SYSTEM ARCHIVE — Built with HTML / CSS / JS • GitHub Pages</div>
  </footer>

  <script src="./js/app.js"></script>
</body>
</html>
