<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SYSTEM ARCHIVE</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <header class="top">
    <div class="wrap top__inner">
      <a class="brand" href="./index.html">SYSTEM ARCHIVE</a>
      <nav class="nav">
        <a href="./catalog.html">Catalog</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">

      <section class="hero panel">
        <h1>Machines, vehicles, and more</h1>
        <p class="muted">Browse by category, then open each machine for full details.</p>
        <div class="hero__actions">
          <a class="btn" href="./catalog.html">Open catalog</a>
        </div>
        <div id="fatalError" class="error"></div>
      </section>

      <section id="statsBar" class="statsbar panel" aria-label="Statistics"></section>

      <section class="panel">
        <div class="row">
          <h2 style="margin:0">Categories</h2>
          <a class="btn btn--ghost" href="./catalog.html">View all</a>
        </div>
        <div id="categoryGrid" class="catgrid"></div>
      </section>

      <section class="panel">
        <h2 style="margin:0 0 8px 0">Newest additions</h2>
        <div id="newestGrid" class="grid"></div>
      </section>

    </div>
  </main>

  <footer class="foot">
    <div class="wrap muted">SYSTEM ARCHIVE — HTML/CSS/JS • GitHub Pages friendly</div>
  </footer>

  <script src="./js/app.js"></script>
</body>
</html>
