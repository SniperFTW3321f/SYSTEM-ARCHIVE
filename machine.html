<!doctype html>
<html lang="en">

  <title>Machine • SYSTEM ARCHIVE</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <script>
    (function(){
      const t = localStorage.getItem("sa_theme") || "nebula";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>

  <header class="top">
    <div class="wrap top__inner">
      <a class="brand" href="./index.html">SYSTEM ARCHIVE</a>
      <nav class="nav">

        <a href="./catalog.html">Catalog</a>
        <div class="theme-switcher">
          <button class="theme-btn" aria-label="Switch theme">
            🎨 <span>Nebula</span> ▾
          </button>
          <div class="theme-dropdown"></div>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div id="fatalError" class="error"></div>
      <div id="machineRoot"></div>
    </div>

  <footer class="foot">
    <div class="wrap muted">Add machines in <code>data/machines.json</code></div>

  <script src="./js/app.js"></script>

</html>
