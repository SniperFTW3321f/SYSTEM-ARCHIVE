<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalog • SYSTEM ARCHIVE</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

  <header class="top">
    <div class="wrap top__inner">
      <a class="brand" href="./index.html">SYSTEM ARCHIVE</a>
      <nav class="nav">
        <a href="./index.html">Home</a>
        <a href="./catalog.html" aria-current="page">Catalog</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap">

      <div class="panel">
        <div class="row">
          <h1 style="margin:0">Catalog</h1>
          <div id="resultsCount" class="muted">0 results</div>
        </div>

        <div class="filters">
          <input
            id="searchInput"
            class="input"
            type="search"
            placeholder="Search name, manufacturer, country..."
            autocomplete="off"
          />
          <select id="categorySelect" class="input"></select>
          <select id="subcategorySelect" class="input"></select>
          <select id="sortSelect" class="input">
            <option value="name_asc">Name A → Z</option>
            <option value="name_desc">Name Z → A</option>
            <option value="year_asc">Year oldest first</option>
            <option value="year_desc">Year newest first</option>
          </select>
        </div>

        <div id="fatalError" class="error"></div>
      </div>

      <div class="grid" id="resultsGrid"></div>

    </div>
  </main>

  <footer class="foot">
    <div class="wrap muted">Click any card to open the full machine info page.</div>
  </footer>

  <script src="./js/app.js"></script>
</body>
</html>
