<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalog • SYSTEM ARCHIVE</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="top">
    <div class="wrap top__inner">
      <a class="brand" href="./index.html">SYSTEM ARCHIVE</a>
      <nav class="nav">
        <a href="./catalog.html" aria-current="page">Catalog</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="row">
        <h1 style="margin:0">Catalog</h1>
        <div id="resultsCount" class="muted">0 results</div>
      </div>

      <div class="filters">
        <input id="searchInput" class="input" placeholder="Search name, manufacturer, country..." />
        <select id="categorySelect" class="input"></select>
        <select id="subcategorySelect" class="input"></select>
      </div>

      <div id="fatalError" class="error"></div>
    </section>

    <section class="grid" id="resultsGrid"></section>
  </main>

  <footer class="foot">
    <div class="wrap muted">Tip: click a card to open the full info page.</div>
  </footer>

  <script src="./js/app.js"></script>
</body>
</html>
