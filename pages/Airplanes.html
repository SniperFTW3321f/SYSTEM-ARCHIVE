<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aerial Division</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../FighterJets/CSS/global.css">
    
    <link rel="stylesheet" href="../css/airplanes.css">

<body>

    <header class="hero-section">
        <div class="hero-content">

            <div class="line"></div>
            <p>SELECT AIRCRAFT CLASS</p>
        </div>
    </header>

    <main>
        <div class="tech-grid">
            
            <a href="https://sniperftw3321f.github.io/Fighter-Jets/" class="tech-card">
                <div class="card-bg">
                    <img src="https://placehold.co/600x400/161b22/58a6ff?text=FIGHTER+JETS" alt="Fighters">
                </div>
                <div class="card-overlay">
                    <span class="id-number">AIR-01</span>
                    <h2>FIGHTER JETS</h2>
                    <p class="status">STATUS: ONLINE</p>
                </div>
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
            </a>

            <a href="https://sniperftw3321f.github.io/Cargo-Planes/" class="tech-card">
                <div class="card-bg">
                    <img src="https://placehold.co/600x400/161b22/58a6ff?text=CARGO+HAULERS" alt="Cargo">

                <div class="card-overlay">
                    <span class="id-number">AIR-02</span>

                </div>
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
            </a>

            <a href="https://sniperftw3321f.github.io/Passager-planes/" class="tech-card">
                <div class="card-bg">
                    <img src="https://placehold.co/600x400/161b22/58a6ff?text=COMMERCIAL+LINERS" alt="Passenger">
                </div>
                <div class="card-overlay">
                    <span class="id-number">AIR-03</span>
                    <h2>PASSENGER</h2>
                    <p class="status">STATUS: ONLINE</p>
                </div>
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
            </a>

        </div>
    </main>

    <footer>
        <p><a href="../index.html" class="back-link">[ RETURN TO MAIN MENU ]</a></p>
